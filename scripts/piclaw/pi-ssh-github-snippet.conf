# Piclaw deploy keys (paste into ~/.ssh/config on each Pi; no secrets here).
Host github.com-piclaw
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_ed25519_github_piclaw
  IdentitiesOnly yes

Host github.com-workspaces
  HostName github.com
  User git
  IdentityFile ~/.ssh/id_ed25519_github_workspaces
  IdentitiesOnly yes
